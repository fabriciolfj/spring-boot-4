server:
  port: 8080
  shutdown: GRACEFUL
  tomcat:
    connection-timeout: 5s
    keep-alive-timeout: 15s
    accept-count: 100
    threads:
      max: 200
      min-spare: 5

app:
  message: "email"

spring:
  http:
    serviceclient:
      cars:
        base-url: http://localhost:9000/api/v1/cars
  aot:
    repositories:
      enabled: true
    enabled: true
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
    anthropic:
      chat:
        options:
          model: claude-sonnet-4-5-20250929
      api-key: ${KEY:123}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 0
  config:
    import: vault://
  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 12
      password: redis123
      lettuce:
        pool:
          max-active: 8
          max-wait:  -1ms
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 100ms
      ssl:
        enabled: false
  cache:
    type: REDIS
  rabbitmq:
    addresses: localhost
    port: 5672
    username: admin
    password: admin123
  kafka:
    streams:
      application-id: study
    bootstrap-servers:
      - localhost:29092
      - localhost:29095
      - localhost:29094
    properties:
      schema:
        registry:
          url: ${SCHEMA_REGISTRY_URL:http://localhost:7081}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        auto.register.schemas: true
        use.latest.version: true
        # Configurações de performance
        batch.size: 16384
        linger.ms: 5
        buffer.memory: 33554432
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        schema.registry.url: http://localhost:7081
        # Configurações de performance
        fetch.min.bytes: 1024
        max.poll.records: 500
  h2:

    console:
      enabled: true
      path: /h2-console
  batch:
    job:
      enabled: true # executar automaticamente ao subir

  application:
    name: spring-four
  threads:
    virtual:
      enabled: true
  flyway:
    locations:
      - db/migration
  datasource:
    username: root
    password: root
    url: jdbc:postgresql://localhost:5432/postgres
  datasource-read:
    url: jdbc:postgresql://localhost:5433/postgres
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  autoconfigure:
    exclude: >
      org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,
      org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

topic:
  product: product-topic
  details: details
  price: table-price-topic
  productDetails: product-details
  greeting: greeting

cache:
  user:
    ttl: 7200
    prefix: "users:"
  product:
    ttl: 1800
    prefix: "product:"


batch:
  chunk-size: 100
  input-file: classpath:data/transacoes.csv
  max-skip-count: 10


management:
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: '*'
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        enabled: true
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces


kafka:
  backoff:
    interval: 2000
    max_failure: 10

car:
  host: http://localhost:9000/api/v1/cars


logging:
  structured:
    enabled: true
    format:
      console: ecs
  #pattern:
  #  console: "%d{HH:mm:ss} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"


pix:
  retry:
    max-retries: 5
    delay: 200
    jitter: 50
    max-delay: 3000
    timeout: 10000
  concurrency:
    limit: 10

resilience4j:
  ratelimiter:
    configs:
      default: # config base reutilizável
        limit-for-period: 100          # permissões por ciclo
        limit-refresh-period: 1s       # duração do ciclo
        timeout-duration: 0ms          # 0 = falha imediata se sem permissão
        subscribe-for-events: true
        event-consumer-buffer-size: 50

    instances:
      employeeService: # chamadas ao PSP externo
        base-config: default
        limit-for-period: 10           # 10 req/s para o PSP
        limit-refresh-period: 1s
        timeout-duration: 500ms        # espera até 500ms por uma permissão
        register-health-indicator: true
  circuitbreaker:
    instances:
      employeeService:
        # janela deslizante
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5          # mínimo para avaliar

        # thresholds
        failure-rate-threshold: 50          # % falhas para abrir
        slow-call-rate-threshold: 80        # % chamadas lentas para abrir
        slow-call-duration-threshold: 2000  # ms → define "chamada lenta"

        # transição de estados
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
        permitted-number-of-calls-in-half-open-state: 3

        # exceptions que NÃO contam como falha
        ignore-exceptions:
          - com.github.fabriciolfj.study.exceptions.CarNotFoundException

        # métricas / health
        register-health-indicator: true
        event-consumer-buffer-size: 10
